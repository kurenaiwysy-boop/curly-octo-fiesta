name: Sync Firecrawl Image
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Aliyun
        uses: docker/login-action@v3
        with:
          registry: crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Pull and Push
        run: |
          # 1. 使用官方最新的 GHCR 镜像路径
          docker pull ghcr.io/firecrawl/firecrawl:latest
          
          # 2. 打标签推送到你的阿里云北京仓库
          docker tag ghcr.io/firecrawl/firecrawl:latest crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com/yunjiasu/yunjiasu:latest
          
          # 3. 推送
          docker push crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com/yunjiasu/yunjiasu:latest
