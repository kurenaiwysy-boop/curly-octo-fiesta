name: Universal Docker Image Sync

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: 'GitHub仓库名称 (例如: continuedev/continue)'
        required: true
        type: string
      target_name:
        description: '推送到阿里云的名字 (例如: continue)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Login to Aliyun
      uses: docker/login-action@v3
      with:
        registry: crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Dynamic Fetch, Pull, Tag, and Push
      run: |
        REPO="${{ github.event.inputs.repo_name }}"
        TARGET_NAME="${{ github.event.inputs.target_name }}"
        
        # 1. 获取最新 Release 标签
        RAW_TAG=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" | jq -r .tag_name)
        
        if [ "$RAW_TAG" == "null" ] || [ -z "$RAW_TAG" ]; then
          LATEST_TAG="latest"
        else
          # 【核心修复】清洗标签：去除开头的 'v'，去除末尾的 '-vscode' 或 '-extension'
          # 这样 v1.2.22-vscode 就会变成 1.2.22，这更符合 Docker 镜像的命名习惯
          LATEST_TAG=$(echo $RAW_TAG | sed 's/^v//' | sed 's/-vscode//g' | sed 's/-extension//g')
          echo "检测到 Release: $RAW_TAG -> 转换镜像标签: $LATEST_TAG"
        fi

        # 2. 尝试多种可能的标签组合进行拉取
        # 组合顺序：清洗后的标签 -> 原始标签 -> latest
        success=false
        for tag in "$LATEST_TAG" "$RAW_TAG" "latest"; do
          echo "正在尝试从 GHCR 拉取标签: $tag ..."
          if docker pull ghcr.io/$REPO:$tag; then
            SOURCE_IMAGE="ghcr.io/$REPO:$tag"
            success=true
            FINAL_TAG=$tag
            break
          fi
          
          echo "正在尝试从 Docker Hub 拉取标签: $tag ..."
          if docker pull $REPO:$tag; then
            SOURCE_IMAGE="$REPO:$tag"
            success=true
            FINAL_TAG=$tag
            break
          fi
        done

        if [ "$success" = false ]; then
          echo "错误：无法在 GHCR 或 Docker Hub 找到任何可用镜像标签。"
          exit 1
        fi

        # 3. 打标签并推送
        TARGET_IMAGE="crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com/yunjiasu/$TARGET_NAME:$FINAL_TAG"
        echo "成功！正在推送 $SOURCE_IMAGE 到 $TARGET_IMAGE"
        docker tag $SOURCE_IMAGE $TARGET_IMAGE
        docker push $TARGET_IMAGE
