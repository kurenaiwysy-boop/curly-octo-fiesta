name: Sync MinerU Image

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许你在 Actions 页面手动点按钮运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Login to Aliyun
      uses: docker/login-action@v3
      with:
        registry: crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    - name: Pull and Push MinerU
      run: |
        # 1. 拉取官方镜像
        docker pull opendatalab/magic-pdf:latest
        
        # 2. 打标签 (必须写在同一行，注意空格)
        docker tag opendatalab/magic-pdf:latest crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com/yunjiasu/mineru:latest
        
        # 3. 推送到阿里云 (必须写在同一行)
        docker push crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com/yunjiasu/mineru:latest
