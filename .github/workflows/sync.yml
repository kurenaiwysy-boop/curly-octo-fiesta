name: Sync MinerU Image

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许你手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Login to Aliyun
      uses: docker/login-action@v3
      with:
        registry: crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    - name: Pull and Push MinerU
      run: |
        # 尝试拉取 MinerU 的全功能版本 (Magic-PDF)
        docker pull opendatalab/magic-pdf:v0.6.2 || docker pull opendatalab/magic-pdf:v0.1.0
        
        # 这里的标签也要对应修改
        docker tag opendatalab/magic-pdf:v0.6.2 crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com/yunjiasu/mineru:latest
        
        docker push crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com/yunjiasu/mineru:latest
