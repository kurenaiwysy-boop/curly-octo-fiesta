name: Universal Docker Image Sync

on:
  workflow_dispatch:
    inputs:
      source_image:
        description: '源镜像地址 (例如: continuedev/continue:latest)'
        required: true
        type: string
      target_name:
        description: '阿里云上的名字 (例如: continue)'
        required: true
        type: string
      target_tag:
        description: '阿里云上的版本号 (例如: latest)'
        required: true
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Login to Aliyun
      uses: docker/login-action@v3
      with:
        registry: crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    - name: Pull, Tag, and Push
      run: |
        echo "1. 正在从 Docker Hub 拉取源镜像: ${{ github.event.inputs.source_image }}..."
        docker pull ${{ github.event.inputs.source_image }}
        
        echo "2. 正在打上阿里云的标签..."
        docker tag ${{ github.event.inputs.source_image }} crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com/yunjiasu/${{ github.event.inputs.target_name }}:${{ github.event.inputs.target_tag }}
        
        echo "3. 正在推送到阿里云个人仓库..."
        docker push crpi-ijj9zfzhl4gaftp8.cn-beijing.personal.cr.aliyuncs.com/yunjiasu/${{ github.event.inputs.target_name }}:${{ github.event.inputs.target_tag }}
